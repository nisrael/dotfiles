---
# Debian/Ubuntu installation via griffo.io debian repository (added by dariogriffo-repo.yml)
- name: Install zig on Debian/Ubuntu
  ansible.builtin.apt:
    name: zig
    state: present
  become: true
  when: ansible_facts.os_family == "Debian"

# Fedora installation
- name: Install zig on Fedora
  ansible.builtin.dnf:
    name: zig
    state: present
  become: true
  when: ansible_facts.os_family == "RedHat"

